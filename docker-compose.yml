# Full local stack:
#   - redis            (pub/sub + persistence)
#   - backend1, backend2  (TWO instances, to exercise the Redis fanout path)
#   - lb               (nginx with sticky sessions, fronts both backends)
#   - exec-engine      (Docker-sandboxed code runner)
#   - frontend         (built static bundle on nginx)
#
# Boot order is enforced via depends_on. Redis is the only stateful
# service; everything else is horizontally scalable.
#
#   docker compose up --build
#   open http://localhost:8080

version: '3.9'

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend1:
    build: ./backend
    environment:
      PORT: "4000"
      REDIS_URL: "redis://redis:6379"
      EXEC_ENGINE_URL: "http://exec-engine:7000"
      INSTANCE_ID: "backend1"
      AUTH_REQUIRED: "false"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      redis:
        condition: service_healthy

  backend2:
    build: ./backend
    environment:
      PORT: "4000"
      REDIS_URL: "redis://redis:6379"
      EXEC_ENGINE_URL: "http://exec-engine:7000"
      INSTANCE_ID: "backend2"
      AUTH_REQUIRED: "false"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      redis:
        condition: service_healthy

  exec-engine:
    build: ./execution-engine
    # Docker-in-Docker via the host socket. See the Dockerfile note for
    # the security caveat; production should use sysbox or Firecracker.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PORT: "7000"

  lb:
    image: nginx:1.27-alpine
    depends_on: [backend1, backend2]
    ports: ["4000:80"]    # the URL the frontend talks to
    volumes:
      - ./nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
      args:
        # The frontend talks to the LB, not the backends directly.
        VITE_API_URL: "http://localhost:4000"
        VITE_WS_URL: "ws://localhost:4000/ws"
    ports: ["8080:80"]
    depends_on: [lb]

volumes:
  redis-data:
