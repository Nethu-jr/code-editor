# Nginx configured as a WS-aware load balancer with IP-based sticky sessions.
#
# Why sticky?
#   A WebSocket is one long-lived TCP connection. If we round-robin every
#   message we'd be doing it at the HTTP level, which doesn't apply once
#   the connection has been upgraded. So "sticky" here just means "this
#   client's WS lands on one backend and stays there until disconnect."
#   Cross-backend coordination then happens via Redis Pub/Sub, NOT via
#   moving the connection.
#
# Why ip_hash and not least_conn?
#   Reconnects from the same client should ideally re-land on the same
#   backend (so the in-memory session/cursor state is still there). ip_hash
#   gives us that for free. For users behind shared NATs you'd want a
#   cookie-based sticky module (`sticky` in nginx-plus) instead.

upstream backend_pool {
  ip_hash;
  server backend1:4000;
  server backend2:4000;
}

server {
  listen 80;

  # WebSocket upgrade requires these headers + version.
  location /ws {
    proxy_pass http://backend_pool;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    # Long timeouts: a WS may sit idle for minutes between keepalive pings.
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
  }

  # REST endpoints (auth, AI, run) — same backends, no upgrade needed.
  location / {
    proxy_pass http://backend_pool;
    proxy_set_header Host      $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
